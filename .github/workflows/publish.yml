name: Publish to PyPI

# Publishes engram-memory-vault to PyPI automatically whenever a GitHub
# Release is published. Uses PyPI Trusted Publishing (OIDC) - no API token
# is stored anywhere. One-time setup on PyPI: project engram-memory-vault ->
# Manage -> Publishing -> add a GitHub publisher (owner MaxFreedomPollard,
# repo engRAM, workflow publish.yml, environment pypi).

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true   # a re-run for an already-uploaded version is a no-op, not a failure
